en: &DEFAULT_EN
  header:
    title: "Built for the Toughest Workloads"
    text: Arctic Tech
    button: Tell Me More
    buttonlink: "#services"

  services:
    title: "Services"
    text: ""
    section: services
    list:
      - title: "IT Services"
        desc: "We deliver end-to-end IT services that keep your systems reliable, secure, and operating at peak performance. From infrastructure management to proactive support, we ensure your technology scales with your business."
        image: assets/img/services/01-service.jpg
      - title: "Network Infrastructure"
        desc: "We design and implement resilient, secure network infrastructure, from cloud and serverless environments to on-prem systems. Our approach prioritizes performance, security, and scalability to support mission-critical operations."
        image: assets/img/services/02-service.jpg
      - title: "Software Development"
        desc: "We integrate and automate complex systems to create seamless, efficient workflows across your organization. By connecting platforms, data, and processes, we help you reduce friction, improve visibility, and operate more effectively."
        image: assets/img/services/03-service.jpg

  portfolio:
    title: "Projects"
    text: ""
    section: portfolio
    closebutton: "Close"

  about:
    title: "About Us"
    text: "Arctic Technology"
    body: "Arctic Technology is a technology services firm that helps organizations design, build, and operate modern digital infrastructure. The company specializes in systems integration and devops enabling seamless connectivity between platforms while streamlining software delivery and deployment. Arctic Technology helps organizations improve scalability, accelerate development cycles, and maintain high-performing, highly-secure, mission critical systems."
    section: about

  contact:
    title: "Contact Us"
    text: ""
    section: contact
    name: "Name*"
    name-validation: "Please enter your name."
    email: "Email*"
    email-validation: "Please enter your email address."
    phone: "Phone Number"
    phone-validation: "Please enter your phone number."
    message: "Message*"
    message-validation: "Please enter a message."
    subject: "Contact Form Submission"
    submit: "Send Message"

  footer:
    legal: "Privacy Policy"
    social:
      - url: https://github.com/ArcticTechnology
        icon: "fab fa-github"
      - url: https://pypi.org/user/mystic.technology/
        icon: "fas fa-cubes"
      - url: mailto:partner@arctictech.io
        icon: "fas fa-envelope"
      - url: https://blog.arctic.technology/
        icon: "fas fa-rss"
